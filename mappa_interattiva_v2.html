(function(){
  const FILL="#F4EAD5", STROKE="#B9A982", INK="#2B2620", MUTED="#7A7064";
  const MAXLEVEL=50; // clic massimi per regione (colore satura a 20)
  // scala di rossi dal piu chiaro al piu intenso
  const REDS=["#F4EAD5","#F0C9B8","#EBC0AF","#E7B6A6","#E2AD9D","#DEA495","#D99A8C","#D59183","#D0887A","#CC7E71","#C77568","#C36C60","#BE6357","#BA594E","#B55045","#B1473C","#AC3D33","#A8342B","#A32B22","#9F2119","#9A1810"];
  const pathsG=document.getElementById('paths');
  const labelsG=document.getElementById('labels');
  const totalEl=document.getElementById('total');
  const regcountEl=document.getElementById('regcount');
  const listEl=document.getElementById('list');
  const emptyEl=document.getElementById('empty');
  const hintEl=document.getElementById('hint');
  const level={};   // nome -> livello 0..MAXLEVEL
  const pathByName={};

  function totals(){
    let total=0, regs=0;
    REGIONS.forEach(r=>{ const l=level[r.n]||0; total+=l; if(l>0) regs++; });
    return {total,regs};
  }

  function render(){
    const {total,regs}=totals();
    totalEl.textContent=total;
    regcountEl.textContent=regs;
    // lista ordinata per livello decrescente
    const active=REGIONS.filter(r=>(level[r.n]||0)>0)
                        .sort((a,b)=>(level[b.n]||0)-(level[a.n]||0));
    listEl.innerHTML="";
    emptyEl.style.display = active.length? "none":"block";
    active.forEach(r=>{
      const l=level[r.n]||0;
      const row=document.createElement('div');
      row.style.cssText="display:flex;align-items:center;justify-content:space-between;gap:8px;padding:6px 9px;border-radius:8px;background:"+REDS[Math.min(l,20)]+";";
      const dark = l>=11;
      const name=document.createElement('div');
      name.innerHTML='<span style="font-weight:600;font-size:14px;color:'+(dark?"#fff":INK)+';">'+r.it+'</span>'
        + (r.de? '<span style="font-size:12px;font-style:italic;color:'+(dark?"#ffe":MUTED)+';"> ('+r.de+')</span>':'');
      const badge=document.createElement('span');
      badge.textContent="×"+l;
      badge.style.cssText="font-size:13px;font-weight:700;color:"+(dark?"#fff":"#C8372D")+";white-space:nowrap;";
      row.appendChild(name); row.appendChild(badge);
      listEl.appendChild(row);
    });
  }

  function setLevel(name, delta){
    const cur=level[name]||0;
    let nl=cur+delta;
    if(nl<0) nl=0; if(nl>MAXLEVEL) nl=MAXLEVEL;
    level[name]=nl;
    pathByName[name].setAttribute('fill', REDS[Math.min(nl,20)]);
    render();
  }

  REGIONS.forEach(r=>{
    const p=document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d', r.d); p.setAttribute('fill', FILL); p.setAttribute('stroke', STROKE);
    p.setAttribute('stroke-width','0.8'); p.setAttribute('stroke-linejoin','round');
    p.style.cursor='pointer'; p.style.transition='fill 0.12s';
    pathByName[r.n]=p;
    p.addEventListener('mouseenter',()=>{ hintEl.textContent=r.it+(r.de?' ('+r.de+')':''); });
    // MOUSE: click sx = +1, click dx = -1
    p.addEventListener('click',(e)=>{ if(p._touched) return; e.preventDefault(); setLevel(r.n,+1); });
    p.addEventListener('contextmenu',(e)=>{ e.preventDefault(); setLevel(r.n,-1); });
    // TABLET: tap = +1, doppio-tap rapido = -1
    p.addEventListener('touchend',(e)=>{
      e.preventDefault();
      p._touched=true; setTimeout(()=>{ p._touched=false; }, 600);
      const now=Date.now();
      if(p._lastTap && (now - p._lastTap) < 350){
        setLevel(r.n,-2);
        p._lastTap=0;
      } else {
        setLevel(r.n,+1);
        p._lastTap=now;
      }
    }, {passive:false});
    pathsG.appendChild(p);
    // etichetta bilingue
    const t=document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x', r.cx); t.setAttribute('y', r.cy); t.setAttribute('text-anchor','middle');
    t.setAttribute('font-family','system-ui,sans-serif'); t.style.pointerEvents='none';
    const l1=document.createElementNS('http://www.w3.org/2000/svg','tspan');
    l1.setAttribute('x', r.cx); l1.setAttribute('font-size','10.5'); l1.setAttribute('font-weight','600'); l1.setAttribute('fill', INK);
    l1.textContent=r.it; t.appendChild(l1);
    if(r.de){
      const l2=document.createElementNS('http://www.w3.org/2000/svg','tspan');
      l2.setAttribute('x', r.cx); l2.setAttribute('dy','11'); l2.setAttribute('font-size','9'); l2.setAttribute('font-style','italic'); l2.setAttribute('fill', MUTED);
      l2.textContent='('+r.de+')'; t.appendChild(l2);
    }
    labelsG.appendChild(t);
  });

  document.getElementById('reset').addEventListener('click',()=>{
    REGIONS.forEach(r=>{ level[r.n]=0; pathByName[r.n].setAttribute('fill',FILL); });
    render();
  });

  render();
})();
</script>
