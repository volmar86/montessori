name: Aggiornamento Dati AGSI

on:
  schedule:
    - cron: '0 6 * * 1' # Runs each Monday at 06:00 UTC
  workflow_dispatch: # Can be run manually with a click on GitHub

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install Requests
      run: pip install requests

    - name: Extract data from API AGSI
      env:
        AGSI_KEY: ${{ secrets.AGSI_API_KEY }}
      run: |
        python -c "
        import os
        import requests
        import json
        from datetime import datetime, timedelta

        headers = {'x-key': os.environ.get('AGSI_KEY')}
        start_date = '2025-10-01'
        target_end = '2026-11-01'

        def fetch_data(country):
            # Explicitly specify the country/zone to get a clean, sorted time series
            url = f'https://agsi.gie.eu/api?country={country}&from={start_date}&size=600'
            try:
                res = requests.get(url, headers=headers).json()
                data_map = {}
                for row in res.get('data', []):
                    date_str = row.get('gasDayStart')
                    full_val = row.get('full')
                    if date_str and full_val is not None:
                        data_map[date_str] = float(full_val)
                return data_map
            except Exception as e:
                print(f'Error fetching data for {country}: {e}')
                return {}

        # Dedicated and separate API calls for each region
        eu_map = fetch_data('EU')
        de_map = fetch_data('DE')
        it_map = fetch_data('IT')

        # Generate the complete timeline needed for the HTML interface
        current = datetime.strptime(start_date, '%Y-%m-%d')
        end_target_dt = datetime.strptime(target_end, '%Y-%m-%d')
        dates_labels = []
        while current <= end_target_dt:
            dates_labels.append(current.strftime('%Y-%m-%d'))
            current += timedelta(days=1)

        # Find the latest common date where all three datasets have real data
        common_dates = set(eu_map.keys()) & set(de_map.keys()) & set(it_map.keys())
        max_historical_date = max(common_dates) if common_dates else start_date

        eu_hist, de_hist, it_hist = [], [], []
        
        # Initial fallback values in case of missing data on the starting day
        last_eu, last_de, last_it = 80.0, 75.0, 90.0

        for d in dates_labels:
            if d <= max_historical_date:
                # If a specific day has an API glitch, reuse the last valid data point
                if d in eu_map: last_eu = eu_map[d]
                if d in de_map: last_de = de_map[d]
                if d in it_map: last_it = it_map[d]
                
                eu_hist.append(last_eu)
                de_hist.append(last_de)
                it_hist.append(last_it)
            else:
                # Stop populating historical data once the future projection window opens
                break

        # Calculate the 30-day rolling average rate using the latest available real data
        if len(eu_hist) >= 30:
            last_idx = len(eu_hist) - 1
            prev_idx = last_idx - 30
            eu_rate = (eu_hist[last_idx] - eu_hist[prev_idx]) / 30
            de_rate = (de_hist[last_idx] - de_hist[prev_idx]) / 30
            it_rate = (it_hist[last_idx] - it_hist[prev_idx]) / 30
        else:
            eu_rate, de_rate, it_rate = 0.27, 0.26, 0.28

        output = {
            'datesLabels': dates_labels,
            'euHist': eu_hist,
            'deHist': de_hist,
            'itHist': it_hist,
            'euDefaultRate': round(eu_rate, 2),
            'deDefaultRate': round(de_rate, 2),
            'itDefaultRate': round(it_rate, 2)
        }

        with open('data.json', 'w') as f:
            json.dump(output, f, indent=4)
        print('JSON file successfully generated with complete historical data.')
        "

    - name: Save in GitHub server
      run: |
        git config --global user.name 'AGSI Bot'
        git config --global user.email 'bot@github.com'
        git add data.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Automated update of AGSI data and rolling projections" && git push)
