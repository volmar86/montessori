name: Aggiornamento Dati AGSI

on:
  schedule:
    - cron: '0 6 * * 1' # Runs each Monday at 06:00 UTC
  workflow_dispatch: # Can be run manually with a click on GitHub

# FIX: Diamo esplicitamente i permessi di scrittura al BOT per salvare il file data.json
permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
    # FIX: Aggiornato a v4 per eliminare il warning di Node.js
    - name: Checkout repository
      uses: actions/checkout@v4

    # FIX: Aggiornato a v5 per eliminare il warning di Node.js
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install Requests
      run: pip install requests

    - name: Extract data from API AGSI
      env:
        AGSI_KEY: ${{ secrets.AGSI_API_KEY }}
      run: |
        python -c "
        import os
        import requests
        import json
        from datetime import datetime, timedelta

        headers = {'x-key': os.environ.get('AGSI_KEY')}
        start_date = '2025-10-01'
        target_end = '2026-11-01'

        def fetch_data(country=None):
            url = f'https://agsi.gie.eu/api?from={start_date}&size=600'
            if country:
                url += f'&country={country}'
            
            res = requests.get(url, headers=headers).json()
            data_map = {}
            for row in res.get('data', []):
                date_str = row.get('gasDayStart')
                full_val = row.get('full')
                if date_str and full_val is not None:
                    try:
                        data_map[date_str] = float(full_val)
                    except ValueError:
                        pass
            return data_map

        eu_map = fetch_data()
        de_map = fetch_data('DE')
        it_map = fetch_data('IT')

        current = datetime.strptime(start_date, '%Y-%m-%d')
        end_target_dt = datetime.strptime(target_end, '%Y-%m-%d')
        dates_labels = []
        while current <= end_target_dt:
            dates_labels.append(current.strftime('%Y-%m-%d'))
            current += timedelta(days=1)

        available_dates = sorted(list(set(eu_map.keys()) & set(de_map.keys()) & set(it_map.keys())))
        
        eu_hist, de_hist, it_hist = [], [], []
        for d in dates_labels:
            if d in available_dates:
                eu_hist.append(eu_map[d])
                de_hist.append(de_map[d])
                it_hist.append(it_map[d])
            else:
                break

        if len(eu_hist) >= 30:
            last = len(eu_hist) - 1
            prev = last - 30
            eu_rate = (eu_hist[last] - eu_hist[prev]) / 30
            de_rate = (de_hist[last] - de_hist[prev]) / 30
            it_rate = (it_hist[last] - it_hist[prev]) / 30
        else:
            eu_rate, de_rate, it_rate = 0.27, 0.26, 0.28

        output = {
            'datesLabels': dates_labels,
            'euHist': eu_hist,
            'deHist': de_hist,
            'itHist': it_hist,
            'euDefaultRate': round(eu_rate, 2),
            'deDefaultRate': round(de_rate, 2),
            'itDefaultRate': round(it_rate, 2)
        }

        with open('data.json', 'w') as f:
            json.dump(output, f, indent=4)
        "

    - name: Save in GitHub server
      run: |
        git config --global user.name 'AGSI Bot'
        git config --global user.email 'bot@github.com'
        git add data.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Automated update of AGSI data and rolling projections" && git push)
